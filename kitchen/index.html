<html lang="en">
<head>

    <link rel="stylesheet" href="../css/client.css">
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Kitchen Dashboard | KDS</title>

      theme: {
        extend: {
          "colors": {
                  "inverse-primary": "#a9c7ff",
                  "surface-dim": "#d8dadc",
                  "outline-variant": "#c4c6d0",

                  "outline": "#747780",

                  "secondary-container": "#e2dfde",

                  "surface-bright": "#f7f9fb",
                  "on-primary-fixed-variant": "#264778",
                  "error-container": "#ffdad6",
                  "primary-container": "#002b5b",
                  "on-secondary-fixed-variant": "#474746",

                  "tertiary-container": "#1d2d41",
                  "inverse-on-surface": "#eff1f3",
                  "secondary": "#5f5e5e",
                  "tertiary-fixed": "#d3e4fe",
                  "on-tertiary-container": "#8495ad",

                  "primary": "#001736",
                  "on-tertiary-fixed-variant": "#38485d",
                  "primary-fixed": "#d6e3ff",

    <style>
        .bg-pattern-light {
            background-image: linear-gradient(rgba(211, 211, 255, 0.85), rgba(255, 255, 255, 0.85)), url('https://lh3.googleusercontent.com/aida/AP1WRLu6c1eOBycoOhr8d1SXuiHHJ2p6UFS7W2aOZkBXjny6fvIs_6xymLzH0UsMR7FkOSpmq8iA3Rgj70jVG88PGuJNINDzY5gsPYOgnDgBh3IcKArWymKf-uL7T7agVDPUQUJOCSw0gvHUm-wOQkE9H9OVVAAbstEFTKz5Z8_Lg8OSzO2KJuFfVFtK3doqWktfqKKktFzNLf_TzWkD-TcfU94V1-qBjNCjlurGOnhw60gdCD9fBNRYgHzWMpMp') !important;
            background-repeat: repeat;
            background-size: 400px;
            background-attachment: fixed;
        }
    </style>
</head>
<body class="text-on-surface antialiased flex h-screen overflow-hidden bg-pattern-light">
    <!-- Sidebar -->
    <aside class="w-64 bg-surface/90 backdrop-blur-md border-r border-outline-variant/30 flex flex-col">
        <div class="h-20 flex items-center justify-center border-b border-outline-variant/30">
            <h1 class="text-xl font-bold text-primary tracking-wider">PHO KITCHEN</h1>
        </div>
        <nav class="flex-1 p-4 space-y-2">
            <a href="index.html" class="flex items-center space-x-3 p-3 rounded-lg hover:bg-surface-container-high transition-colors bg-primary-container text-on-primary-container font-semibold">
                <span class="material-symbols-outlined">soup_kitchen</span>
                <span>KDS Board</span>
            </a>
        </nav>
        <div class="p-4 border-t border-outline-variant/30">
            <button onclick="window.logoutUser()" class="flex w-full items-center space-x-3 p-3 rounded-lg hover:bg-red-900/50 text-red-400 transition-colors">
                <span class="material-symbols-outlined">logout</span>
                <span>Logout</span>
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-screen overflow-y-auto">
        <header class="h-20 bg-surface/90 backdrop-blur-md border-b border-outline-variant/30 flex items-center justify-between px-8 flex-shrink-0">
            <h2 class="text-2xl font-semibold text-on-surface">Kitchen Display System</h2>
            <div class="flex items-center space-x-4">
                <span class="material-symbols-outlined text-secondary cursor-pointer hover:text-on-surface">notifications</span>
                <div class="w-10 h-10 rounded-full bg-primary flex items-center justify-center text-on-surface font-bold" id="user-avatar-icon">K</div>
            </div>
        </header>
        
        <div class="p-8 flex-1 flex flex-col gap-6">
            <!-- Stat Cards -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 flex-shrink-0">
                <div class="bg-surface/90 backdrop-blur-md rounded-xl border border-outline-variant/30 p-6 flex items-center justify-between shadow-lg">
                    <div>
                        <p class="text-sm text-secondary font-medium uppercase tracking-wider">Pending Orders</p>
                        <h3 id="pending-count" class="text-3xl font-bold text-red-500 mt-1">0</h3>
                    </div>
                    <div class="w-12 h-12 bg-red-500/10 rounded-lg flex items-center justify-center text-red-500">
                        <span class="material-symbols-outlined text-3xl">receipt_long</span>
                    </div>
                </div>
                <div class="bg-surface/90 backdrop-blur-md rounded-xl border border-outline-variant/30 p-6 flex items-center justify-between shadow-lg">
                    <div>
                        <p class="text-sm text-secondary font-medium uppercase tracking-wider">Cooking</p>
                        <h3 id="cooking-count" class="text-3xl font-bold text-yellow-500 mt-1">0</h3>
                    </div>
                    <div class="w-12 h-12 bg-yellow-500/10 rounded-lg flex items-center justify-center text-yellow-500">
                        <span class="material-symbols-outlined text-3xl">skillet</span>
                    </div>
                </div>
                <div class="bg-surface/90 backdrop-blur-md rounded-xl border border-outline-variant/30 p-6 flex items-center justify-between shadow-lg">
                    <div>
                        <p class="text-sm text-secondary font-medium uppercase tracking-wider">Ready</p>
                        <h3 id="ready-count" class="text-3xl font-bold text-green-500 mt-1">0</h3>
                    </div>
                    <div class="w-12 h-12 bg-green-500/10 rounded-lg flex items-center justify-center text-green-500">
                        <span class="material-symbols-outlined text-3xl">room_service</span>
                    </div>
                </div>
            </div>

            <!-- KDS Board Grid -->
            <div class="grid grid-cols-1 md:grid-cols-3 xl:grid-cols-4 gap-4 items-start pb-8" id="order-board">
                <!-- Order Cards will be injected here via JS -->
            </div>
        </div>
    </main>

    <script type="module" src="../js/auth.js"></script>
    <script type="module" src="../js/kitchen.js"></script>
    <script type="module">
        import { auth } from "../js/firebase-config.js";
        document.addEventListener('DOMContentLoaded', () => {
            auth.onAuthStateChanged(user => {
                if (user) {
                    const initial = (user.displayName || user.email || 'K').charAt(0).toUpperCase();
                    document.getElementById('user-avatar-icon').textContent = initial;
                }
            });
        });
    </script>
</body>
</html>
