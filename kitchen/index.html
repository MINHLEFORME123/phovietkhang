<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Kitchen Display System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white font-['Inter'] h-screen flex flex-col overflow-hidden">
    <header class="bg-gray-900 p-4 flex justify-between items-center border-b border-gray-700">
        <div class="flex items-center space-x-4">
            <h1 class="text-3xl font-bold text-yellow-400">KITCHEN DISPLAY</h1>
            <a href="../admin/order-manager.html" class="bg-gray-850 hover:bg-gray-800 border border-gray-700 text-gray-300 hover:text-white px-3 py-1.5 rounded-lg text-sm font-semibold flex items-center gap-1.5 transition-colors">
                <span class="material-symbols-outlined text-sm">arrow_back</span>
                <span>Admin Panel</span>
            </a>
        </div>
        <div class="flex space-x-6 text-xl">
            <div>Pending: <span class="text-red-500 font-bold" id="pending-count">0</span></div>
            <div>Cooking: <span class="text-yellow-500 font-bold" id="cooking-count">0</span></div>
            <div>Ready: <span class="text-green-500 font-bold" id="ready-count">0</span></div>
        </div>
    </header>
    <main class="flex-1 p-4 grid grid-cols-1 md:grid-cols-3 xl:grid-cols-4 gap-4 overflow-x-auto items-start" id="order-board">
        <!-- Order Cards will be injected here via JS -->
    </main>
    <script type="module" src="../js/kitchen.js"></script>
</body>
</html>
