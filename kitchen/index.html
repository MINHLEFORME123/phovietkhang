<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/client.css">
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Kitchen Dashboard | KDS</title>
    <!-- Google Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <script>
    tailwind.config = {
      darkMode: "class",
      theme: { extend: { colors: { surface: "#121824", "surface-highlight": "#1e293b", primary: "#3b82f6", secondary: "#9ca3af", "on-surface": "#f3f4f6" } } }
    }
    </script>
</head>
<body class="bg-[#0b0f19] text-on-surface font-['Inter'] flex h-screen overflow-hidden">
    <!-- Sidebar -->
    <aside class="w-64 bg-surface border-r border-gray-800 flex flex-col">
        <div class="h-20 flex items-center justify-center border-b border-gray-800">
            <h1 class="text-xl font-bold text-primary tracking-wider">PHO KITCHEN</h1>
        </div>
        <nav class="flex-1 p-4 space-y-2">
            <a href="index.html" class="flex items-center space-x-3 p-3 rounded-lg hover:bg-surface-highlight transition-colors bg-primary/20 text-primary">
                <span class="material-symbols-outlined">soup_kitchen</span>
                <span>KDS Board</span>
            </a>
        </nav>
        <div class="p-4 border-t border-gray-800">
            <button onclick="window.logoutUser()" class="flex w-full items-center space-x-3 p-3 rounded-lg hover:bg-red-900/50 text-red-400 transition-colors">
                <span class="material-symbols-outlined">logout</span>
                <span>Logout</span>
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-screen overflow-y-auto">
        <header class="h-20 bg-surface border-b border-gray-800 flex items-center justify-between px-8 flex-shrink-0">
            <h2 class="text-2xl font-semibold text-white">Kitchen Display System</h2>
            <div class="flex items-center space-x-4">
                <span class="material-symbols-outlined text-secondary cursor-pointer hover:text-white">notifications</span>
                <div class="w-10 h-10 rounded-full bg-primary flex items-center justify-center text-white font-bold" id="user-avatar-icon">K</div>
            </div>
        </header>
        
        <div class="p-8 flex-1 flex flex-col gap-6">
            <!-- Stat Cards -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 flex-shrink-0">
                <div class="bg-surface rounded-xl border border-gray-800 p-6 flex items-center justify-between shadow-lg">
                    <div>
                        <p class="text-sm text-secondary font-medium uppercase tracking-wider">Pending Orders</p>
                        <h3 id="pending-count" class="text-3xl font-bold text-red-500 mt-1">0</h3>
                    </div>
                    <div class="w-12 h-12 bg-red-500/10 rounded-lg flex items-center justify-center text-red-500">
                        <span class="material-symbols-outlined text-3xl">receipt_long</span>
                    </div>
                </div>
                <div class="bg-surface rounded-xl border border-gray-800 p-6 flex items-center justify-between shadow-lg">
                    <div>
                        <p class="text-sm text-secondary font-medium uppercase tracking-wider">Cooking</p>
                        <h3 id="cooking-count" class="text-3xl font-bold text-yellow-500 mt-1">0</h3>
                    </div>
                    <div class="w-12 h-12 bg-yellow-500/10 rounded-lg flex items-center justify-center text-yellow-500">
                        <span class="material-symbols-outlined text-3xl">skillet</span>
                    </div>
                </div>
                <div class="bg-surface rounded-xl border border-gray-800 p-6 flex items-center justify-between shadow-lg">
                    <div>
                        <p class="text-sm text-secondary font-medium uppercase tracking-wider">Ready</p>
                        <h3 id="ready-count" class="text-3xl font-bold text-green-500 mt-1">0</h3>
                    </div>
                    <div class="w-12 h-12 bg-green-500/10 rounded-lg flex items-center justify-center text-green-500">
                        <span class="material-symbols-outlined text-3xl">room_service</span>
                    </div>
                </div>
            </div>

            <!-- KDS Board Grid -->
            <div class="grid grid-cols-1 md:grid-cols-3 xl:grid-cols-4 gap-4 items-start pb-8" id="order-board">
                <!-- Order Cards will be injected here via JS -->
            </div>
        </div>
    </main>

    <script type="module" src="../js/auth.js"></script>
    <script type="module" src="../js/kitchen.js"></script>
    <script type="module">
        import { auth } from "../js/firebase-config.js";
        document.addEventListener('DOMContentLoaded', () => {
            auth.onAuthStateChanged(user => {
                if (user) {
                    const initial = (user.displayName || user.email || 'K').charAt(0).toUpperCase();
                    document.getElementById('user-avatar-icon').textContent = initial;
                }
            });
        });
    </script>
</body>
</html>
