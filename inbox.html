<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/client.css">
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>PHO VIET KHANG | Inbox</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <!-- Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                "inverse-primary": "#a9c7ff",
                "surface-dim": "#111318",
                "on-surface": "#f3f4f6",
                "background": "#07182b",
                "surface": "#121824",
                "primary": "#3b82f6",
                "secondary": "#9ca3af",
                "surface-container-low": "#18202d",
                "outline-variant": "rgba(255, 255, 255, 0.1)",
                "primary-container": "#3b82f6",
                "on-primary-container": "#ffffff",
              },
              "spacing": {
                "gutter": "24px",
                "max-width": "1280px",
                "margin-mobile": "16px",
                "margin-desktop": "64px",
                "unit": "8px"
              }
            }
          }
        }
    </script>
    <style>
        @keyframes pageFadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        main { animation: pageFadeIn 0.4s ease-out forwards; }
    </style>
</head>
<body class="bg-background text-on-surface font-['Inter'] min-h-screen flex flex-col antialiased">

<!-- Navigation -->
<nav class="fixed top-0 w-full z-50 bg-surface/95 backdrop-blur-md border-b border-outline-variant/30">
    <div class="flex justify-between items-center max-w-max-width mx-auto px-margin-mobile md:px-margin-desktop h-20">
        <a class="font-headline-sm text-lg font-bold text-black tracking-wider flex items-center gap-2" href="index.html">
            <span class="material-symbols-outlined text-black text-[24px]">ramen_dining</span>
            PHỞ VIỆT KHANG
        </a>
        <div class="hidden md:flex items-center space-x-8 font-body-md text-body-md font-semibold tracking-wide">
            <a class="text-secondary hover:text-primary transition-colors hover:opacity-80" href="index.html" data-i18n="nav-home">Home</a>
            <a class="text-secondary hover:text-primary transition-colors hover:opacity-80" href="menu.html" data-i18n="nav-menu">Menu</a>
            <a class="text-secondary hover:text-primary transition-colors hover:opacity-80" href="locations.html" data-i18n="nav-locations">Locations</a>
            <a class="text-secondary hover:text-primary transition-colors hover:opacity-80" href="contact.html" data-i18n="nav-contact">Contact</a>
            <a class="text-primary transition-colors hover:opacity-80 relative flex items-center gap-1" href="inbox.html">
                <span data-i18n="nav-inbox">Inbox</span>
                <span id="inbox-badge-nav" class="hidden w-2 h-2 bg-red-500 rounded-full animate-ping"></span>
            </a>
        </div>
        <div class="flex items-center space-x-4">
            <div class="hidden md:flex items-center space-x-2 mr-2">
                <img id="lang-vi" src="https://hatscripts.github.io/circle-flags/flags/vn.svg" alt="VN" class="w-8 h-8 cursor-pointer hover:opacity-80 transition-all duration-300 ring-2 ring-transparent" style="border-radius: 50% !important;" onclick="changeLanguage('vi')">
                <img id="lang-en" src="https://hatscripts.github.io/circle-flags/flags/gb.svg" alt="UK" class="w-8 h-8 cursor-pointer hover:opacity-80 transition-all duration-300 ring-2 ring-transparent" style="border-radius: 50% !important;" onclick="changeLanguage('en')">
                <img id="lang-fi" src="https://hatscripts.github.io/circle-flags/flags/fi.svg" alt="FI" class="w-8 h-8 cursor-pointer hover:opacity-80 transition-all duration-300 ring-2 ring-transparent" style="border-radius: 50% !important;" onclick="changeLanguage('fi')">
            </div>
            <a class="hidden md:inline-flex border-2 border-primary text-primary font-body-sm text-body-sm font-semibold px-5 py-2 rounded-xl hover:bg-primary hover:text-on-primary transition-all duration-300 shadow-sm" href="register.html" data-i18n="nav-register">
                Register
            </a>
            <a class="hidden md:inline-flex bg-primary text-white font-body-sm text-body-sm font-semibold px-6 py-2 rounded-xl hover:opacity-90 shadow-sm hover:shadow-md transition-all duration-300 bg-gradient-to-tr from-primary to-[#003d82]" href="reservations.html" data-i18n="nav-reservations">
                Reservations
            </a>
            <!-- Cart Icon -->
            <a href="cart.html" class="nav-cart-btn relative" title="View Cart">
                <span class="material-symbols-outlined text-[24px]">shopping_cart</span>
                <span id="cart-count" class="hidden absolute -top-1 -right-1 bg-red-500 text-white text-[10px] font-bold rounded-full h-5 w-5 flex items-center justify-center">0</span>
            </a>
            <button class="md:hidden text-primary p-2">
                <span class="material-symbols-outlined">menu</span>
            </button>
        </div>
    </div>
</nav>

<!-- Main Container -->
<main class="flex-1 max-w-7xl mx-auto w-full px-6 py-12 pt-24 flex flex-col">
    <h1 class="text-4xl font-bold font-['EB_Garamond'] text-primary mb-8 text-center"><span data-i18n="inbox-title">Hộp Thư Của Bạn</span></h1>
    
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 flex-1 min-h-[500px]">
        <!-- Messages List Panel -->
        <div class="lg:col-span-1 bg-surface-container-low border border-white/10 rounded-2xl p-4 flex flex-col h-[600px]">
            <h2 class="text-lg font-bold text-white mb-4 border-b border-white/10 pb-3 flex items-center justify-between">
                <span>Danh sách thư</span>
                <span id="unread-count-badge" class="hidden bg-red-500 text-white text-xs font-bold px-2 py-0.5 rounded-full">0</span>
            </h2>
            <div id="messages-list" class="space-y-3 flex-1 overflow-y-auto pr-1">
                <!-- Message summaries injected here -->
                <div class="text-center py-12 text-secondary animate-pulse">
                    <span class="material-symbols-outlined text-4xl mb-2">sync</span>
                    <p class="text-sm">Đang tải tin nhắn...</p>
                </div>
            </div>
        </div>

        <!-- Message Details Panel -->
        <div class="lg:col-span-2 bg-surface-container-low border border-white/10 rounded-2xl p-6 flex flex-col h-[600px] justify-center" id="details-panel-container">
            <div id="message-details-content" class="h-full flex flex-col justify-center items-center text-secondary text-center space-y-3">
                <span class="material-symbols-outlined text-6xl opacity-30">mail_outline</span>
                <p class="text-lg">Chọn một tin nhắn từ danh sách để xem chi tiết</p>
            </div>
        </div>
    </div>
</main>

<script src="js/client.js"></script>
<script type="module" src="js/auth.js"></script>
<script type="module" src="js/inbox.js"></script>
</body>
</html>
