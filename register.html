<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/client.css">
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>PHO VIET KHANG | Register</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <!-- Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
            "primary-container": "#3b82f6",
            "on-surface": "#f3f4f6",
            "secondary": "#9ca3af",
            "surface": "#121824",
            "outline-variant": "rgba(255, 255, 255, 0.1)",
          },
          "fontFamily": {
            "body-sm": ["Inter"], "display-lg-mobile": ["EB Garamond"], "title-lg": ["Inter"],
            "label-caps": ["Inter"], "display-lg": ["EB Garamond"], "headline-sm": ["EB Garamond"],
            "body-lg": ["Inter"], "headline-md": ["EB Garamond"], "body-md": ["Inter"]
          }
        }
      }
    }
    </script>
</head>
<body class="text-on-surface antialiased flex flex-col min-h-screen bg-pattern-dark">
    <nav class="fixed top-0 w-full z-50 bg-[#0a1019]/95 backdrop-blur-md border-b border-white/5">
        <div class="flex justify-between items-center max-w-7xl mx-auto px-4 md:px-16 h-20">
            <a class="flex items-center gap-2.5 shrink-0" href="index.html">
                <span class="material-symbols-outlined text-[32px] text-white">ramen_dining</span>
                <span class="text-white font-bold text-xl tracking-wide" style="font-family:'EB Garamond',serif;">PHỞ VIỆT KHANG</span>
            </a>
            <div class="hidden lg:flex items-center space-x-8 font-medium text-[15px] tracking-wide">
                <a class="text-gray-400 hover:text-white transition-colors duration-200" href="index.html" data-i18n="nav-home">Home</a>
                <a class="text-gray-400 hover:text-white transition-colors duration-200" href="menu.html" data-i18n="nav-menu">Menu</a>
                <a class="text-gray-400 hover:text-white transition-colors duration-200" href="locations.html" data-i18n="nav-locations">Locations</a>
                <a class="text-gray-400 hover:text-white transition-colors duration-200" href="contact.html" data-i18n="nav-contact">Contact</a>
                <a class="text-gray-400 hover:text-white transition-colors duration-200 relative flex items-center gap-1.5" href="inbox.html" id="nav-inbox-link">
                    <span data-i18n="nav-inbox">Inbox</span>
                    <span id="inbox-badge-nav" class="hidden w-2 h-2 bg-red-500 rounded-full animate-ping"></span>
                </a>
            </div>
            <div class="flex items-center gap-3">
                <div class="hidden lg:flex items-center gap-1.5">
                    <button class="w-8 h-8 flex items-center justify-center rounded-full overflow-hidden hover:opacity-80 transition-all duration-200 ring-2 ring-transparent hover:ring-white/30" aria-label="Tiếng Việt" onclick="changeLanguage('vi')">
                        <img id="lang-vi" src="https://hatscripts.github.io/circle-flags/flags/vn.svg" alt="VN" class="w-full h-full object-cover">
                    </button>
                    <button class="w-8 h-8 flex items-center justify-center rounded-full overflow-hidden hover:opacity-80 transition-all duration-200 ring-2 ring-transparent hover:ring-white/30" aria-label="English" onclick="changeLanguage('en')">
                        <img id="lang-en" src="https://hatscripts.github.io/circle-flags/flags/gb.svg" alt="UK" class="w-full h-full object-cover">
                    </button>
                    <button class="w-8 h-8 flex items-center justify-center rounded-full overflow-hidden hover:opacity-80 transition-all duration-200 ring-2 ring-transparent hover:ring-white/30" aria-label="Suomi" onclick="changeLanguage('fi')">
                        <img id="lang-fi" src="https://hatscripts.github.io/circle-flags/flags/fi.svg" alt="FI" class="w-full h-full object-cover">
                    </button>
                </div>
                <a id="nav-register-btn" class="hidden lg:inline-flex border-2 border-white/20 text-white text-sm font-semibold px-5 py-2 rounded-xl hover:bg-white hover:text-black transition-all duration-200" href="register.html" data-i18n="nav-register">Register</a>
                <a class="hidden lg:inline-flex bg-white text-black text-sm font-semibold px-5 py-2 rounded-xl hover:bg-gray-100 transition-all duration-200" href="reservations.html" data-i18n="nav-reservations">Reservations</a>
                <a href="cart.html" class="nav-cart-btn relative text-white hover:text-gray-300 transition-colors p-1" title="View Cart">
                    <span class="material-symbols-outlined text-[22px]">shopping_cart</span>
                    <span id="cart-count" class="hidden absolute -top-1 -right-1 bg-red-500 text-white text-[10px] font-bold rounded-full min-w-[18px] h-[18px] flex items-center justify-center px-1">0</span>
                </a>
                <a id="nav-user-btn" href="login.html" class="text-white hover:text-gray-300 transition-colors">
                    <span class="material-symbols-outlined text-[22px]">account_circle</span>
                </a>
                <button class="lg:hidden text-white p-2 rounded-lg hover:bg-white/10 transition-colors" onclick="toggleMobileMenu()" aria-label="Toggle Menu" aria-expanded="false">
                    <span class="material-symbols-outlined">menu</span>
                </button>
            </div>
        </div>
        <div id="mobile-menu" class="hidden lg:hidden bg-[#0a1019] border-t border-white/5 px-4 py-4 space-y-1 font-medium text-sm max-h-[80vh] overflow-y-auto">
            <a class="block text-gray-300 hover:text-white hover:bg-white/5 rounded-lg px-4 py-3 transition-colors" href="index.html" data-i18n="nav-home">Home</a>
            <a class="block text-gray-300 hover:text-white hover:bg-white/5 rounded-lg px-4 py-3 transition-colors" href="menu.html" data-i18n="nav-menu">Menu</a>
            <a class="block text-gray-300 hover:text-white hover:bg-white/5 rounded-lg px-4 py-3 transition-colors" href="locations.html" data-i18n="nav-locations">Locations</a>
            <a class="block text-gray-300 hover:text-white hover:bg-white/5 rounded-lg px-4 py-3 transition-colors" href="contact.html" data-i18n="nav-contact">Contact</a>
            <a class="block text-gray-300 hover:text-white hover:bg-white/5 rounded-lg px-4 py-3 transition-colors flex items-center gap-2" href="inbox.html">
                <span data-i18n="nav-inbox">Inbox</span>
                <span id="inbox-badge-nav-mobile" class="hidden w-2 h-2 bg-red-500 rounded-full animate-ping"></span>
            </a>
            <div class="flex items-center gap-2 px-4 py-3 border-t border-white/5 mt-2">
                <button class="w-8 h-8 flex items-center justify-center rounded-full overflow-hidden hover:opacity-80 transition-all ring-2 ring-transparent hover:ring-white/30" onclick="changeLanguage('vi')">
                    <img id="lang-vi-mobile" src="https://hatscripts.github.io/circle-flags/flags/vn.svg" alt="VN" class="w-full h-full object-cover">
                </button>
                <button class="w-8 h-8 flex items-center justify-center rounded-full overflow-hidden hover:opacity-80 transition-all ring-2 ring-transparent hover:ring-white/30" onclick="changeLanguage('en')">
                    <img id="lang-en-mobile" src="https://hatscripts.github.io/circle-flags/flags/gb.svg" alt="UK" class="w-full h-full object-cover">
                </button>
                <button class="w-8 h-8 flex items-center justify-center rounded-full overflow-hidden hover:opacity-80 transition-all ring-2 ring-transparent hover:ring-white/30" onclick="changeLanguage('fi')">
                    <img id="lang-fi-mobile" src="https://hatscripts.github.io/circle-flags/flags/fi.svg" alt="FI" class="w-full h-full object-cover">
                </button>
            </div>
            <div class="flex flex-col gap-2 px-4 pt-3 border-t border-white/5">
                <a id="nav-register-btn-mobile" class="w-full text-center border-2 border-white/20 text-white text-sm font-semibold px-5 py-2.5 rounded-xl hover:bg-white hover:text-black transition-all" href="register.html" data-i18n="nav-register">Register</a>
                <a class="w-full text-center bg-white text-black text-sm font-semibold px-5 py-2.5 rounded-xl hover:bg-gray-100 transition-all" href="reservations.html" data-i18n="nav-reservations">Reservations</a>
            </div>
        </div>
    </nav>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const mobileBtn = document.querySelector('[aria-label="Toggle Menu"]');
            const mobileMenu = document.getElementById('mobile-menu');
            if(mobileBtn && mobileMenu) {
                mobileBtn.addEventListener('click', () => {
                    const isHidden = mobileMenu.classList.contains('hidden');
                    mobileMenu.classList.toggle('hidden', !isHidden);
                    mobileBtn.setAttribute('aria-expanded', isHidden.toString());
                });
            }
        });
    </script>

    <!-- Main Content -->
    <main class="flex-grow pt-32 pb-20">
        <div class="max-w-7xl mx-auto px-4 md:px-16">
            <div class="bg-surface/90 backdrop-blur-sm rounded-lg border border-outline-variant p-8 shadow-lg">
                <h1 class="font-headline-md text-4xl text-white mb-6 border-b border-outline-variant pb-4">Register</h1>
                <div class="content-area">
                    <div class="max-w-md mx-auto">
    <form id="register-form" class="space-y-6">
        <div>
            <label for="reg-name" class="block text-sm font-medium text-secondary mb-2" data-i18n="reg-name">Full Name</label>
            <input type="text" id="reg-name" name="name" required
                class="w-full px-4 py-3 bg-[#18202d] border border-outline-variant rounded-lg text-white focus:outline-none focus:ring-2 focus:ring-primary-container transition-all">
        </div>
        <div>
            <label for="reg-email" class="block text-sm font-medium text-secondary mb-2" data-i18n="reg-email">Email Address</label>
            <input type="email" id="reg-email" name="email" required
                class="w-full px-4 py-3 bg-[#18202d] border border-outline-variant rounded-lg text-white focus:outline-none focus:ring-2 focus:ring-primary-container transition-all">
        </div>
        <div>
            <label for="reg-password" class="block text-sm font-medium text-secondary mb-2" data-i18n="reg-password">Password</label>
            <input type="password" id="reg-password" name="password" required minlength="6"
                class="w-full px-4 py-3 bg-[#18202d] border border-outline-variant rounded-lg text-white focus:outline-none focus:ring-2 focus:ring-primary-container transition-all">
        </div>
        <div id="register-error" class="text-red-500 text-sm hidden"></div>
        <button type="submit"
            class="w-full bg-primary-container text-on-primary-container font-semibold py-3 rounded-lg hover:opacity-90 transition-opacity" data-i18n="reg-btn">
            Create Account
        </button>

        <div class="my-6 flex items-center">
            <div class="flex-grow border-t border-gray-700"></div>
            <span class="mx-4 text-sm text-secondary">OR</span>
            <div class="flex-grow border-t border-gray-700"></div>
        </div>

        <button type="button" id="btn-google" class="w-full flex items-center justify-center gap-3 bg-white text-gray-800 font-semibold py-3 px-4 border border-gray-300 rounded-lg shadow-sm hover:bg-gray-100 transition-colors">
            <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google" class="w-5 h-5">
            Sign up with Google
        </button>
        <p class="text-center text-secondary text-sm mt-4">
            <span data-i18n="reg-has-account">Already have an account?</span> 
            <a href="login.html" class="text-primary-container hover:underline" data-i18n="reg-login-link">Sign In</a>
        </p>
    </form>
</div>
                </div>
            </div>
        </div>
    </main>

    <!-- Language Switcher Script -->
    <script src="js/client.js"></script>
<script type="module" src="js/auth.js"></script>
</body>
</html>
