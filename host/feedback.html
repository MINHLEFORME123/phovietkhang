<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/client.css">
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Admin Dashboard | Feedback</title>
    <!-- Google Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <script>
    tailwind.config = {
      darkMode: "class",
      theme: { extend: { colors: { surface: "#121824", "surface-highlight": "#1e293b", primary: "#3b82f6", secondary: "#9ca3af", "on-surface": "#f3f4f6" } } }
    }
    </script>
</head>
<body class="bg-[#0b0f19] text-on-surface font-['Inter'] flex h-screen overflow-hidden">
    <!-- Sidebar -->
    <aside class="w-64 bg-surface border-r border-gray-800 flex flex-col">
        <div class="h-20 flex items-center justify-center border-b border-gray-800">
            <h1 class="text-xl font-bold text-primary tracking-wider">PHO HOST</h1>
        </div>
        <nav class="flex-1 p-4 space-y-2">
            <a href="index.html" id="nav-dashboard" class="flex items-center space-x-3 p-3 rounded-lg hover:bg-surface-highlight transition-colors text-secondary">
                <span class="material-symbols-outlined">dashboard</span>
                <span>Dashboard</span>
            </a>
            <a href="food-list.html" id="nav-food" class="flex items-center space-x-3 p-3 rounded-lg hover:bg-surface-highlight transition-colors text-secondary">
                <span class="material-symbols-outlined">restaurant_menu</span>
                <span>Food Menu</span>
            </a>
            <a href="order-manager.html" id="nav-orders" class="flex items-center space-x-3 p-3 rounded-lg hover:bg-surface-highlight transition-colors text-secondary">
                <span class="material-symbols-outlined">receipt_long</span>
                <span>Orders</span>
            </a>
            <a href="reservations.html" id="nav-reservations" class="flex items-center space-x-3 p-3 rounded-lg hover:bg-surface-highlight transition-colors text-secondary">
                <span class="material-symbols-outlined">table_restaurant</span>
                <span>Reservations</span>
            </a>
            <a href="feedback.html" id="nav-feedback" class="flex items-center space-x-3 p-3 rounded-lg hover:bg-surface-highlight transition-colors bg-primary/20 text-primary">
                <span class="material-symbols-outlined">forum</span>
                <span>Feedback</span>
            </a>
            <a href="messages.html" id="nav-messages" class="flex items-center space-x-3 p-3 rounded-lg hover:bg-surface-highlight transition-colors text-secondary">
                <span class="material-symbols-outlined">mail</span>
                <span>Messages</span>
            </a>
            <a href="../kitchen/index.html" class="flex items-center space-x-3 p-3 rounded-lg hover:bg-surface-highlight transition-colors text-secondary">
                <span class="material-symbols-outlined">soup_kitchen</span>
                <span>Kitchen KDS</span>
            </a>
        </nav>
        <div class="p-4 border-t border-gray-800">
            <button onclick="window.logoutUser()" class="flex w-full items-center space-x-3 p-3 rounded-lg hover:bg-red-900/50 text-red-400 transition-colors">
                <span class="material-symbols-outlined">logout</span>
                <span>Logout</span>
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-screen overflow-y-auto">
        <header class="h-20 bg-surface border-b border-gray-800 flex items-center justify-between px-8 flex-shrink-0">
            <h2 class="text-2xl font-semibold text-white">Customer Feedback</h2>
            <div class="flex items-center space-x-4">
                <span class="material-symbols-outlined text-secondary cursor-pointer hover:text-white">notifications</span>
                <div class="w-10 h-10 rounded-full bg-primary flex items-center justify-center text-white font-bold" id="user-avatar-icon">H</div>
            </div>
        </header>
        <div class="p-8 flex-1">
            <div class="bg-surface rounded-xl border border-gray-800 p-6 shadow-lg">
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="feedback-grid">
                    <div class="col-span-full text-center text-secondary py-10">Loading messages...</div>
                </div>
            </div>
        </div>
    </main>

    <script type="module" src="../js/auth.js"></script>
    <script type="module">
        import { db } from "../js/firebase-config.js";
        import { collection, onSnapshot, doc, updateDoc, deleteDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        document.addEventListener('DOMContentLoaded', () => {
            const grid = document.getElementById('feedback-grid');
            const q = query(collection(db, "feedback"), orderBy("createdAt", "desc"));
            
            onSnapshot(q, (snapshot) => {
                grid.innerHTML = '';
                if (snapshot.empty) {
                    grid.innerHTML = '<div class="col-span-full text-center text-secondary py-10">No feedback messages found.</div>';
                    return;
                }
                
                snapshot.forEach((docSnap) => {
                    const data = docSnap.data();
                    let dateStr = '';
                    if (data.createdAt && data.createdAt.toDate) {
                        dateStr = data.createdAt.toDate().toLocaleString();
                    }

                    const card = document.createElement('div');
                    card.className = `bg-surface-highlight/30 rounded-xl border ${data.status === 'unread' ? 'border-primary/50 shadow-[0_0_15px_rgba(59,130,246,0.1)]' : 'border-gray-800'} p-5 flex flex-col relative`;
                    
                    card.innerHTML = `
                        ${data.status === 'unread' ? '<div class="absolute top-4 right-4 w-3 h-3 bg-primary rounded-full animate-pulse"></div>' : ''}
                        <div class="flex items-center gap-3 mb-4">
                            <div class="w-10 h-10 rounded-full bg-blue-500/10 flex items-center justify-center text-blue-400 font-bold uppercase">
                                ${data.name ? data.name.charAt(0) : '?'}
                            </div>
                            <div>
                                <h4 class="font-semibold text-white">${data.name || 'Anonymous'}</h4>
                                <p class="text-xs text-secondary">${dateStr}</p>
                            </div>
                        </div>
                        <div class="mb-4 text-sm text-gray-300 flex-1 bg-black/20 p-3 rounded-lg border border-white/5 break-words whitespace-pre-wrap">${data.message}</div>
                        <div class="flex flex-col gap-1 mb-4 text-xs text-secondary">
                            <div class="flex items-center gap-2"><span class="material-symbols-outlined text-[14px]">mail</span> <a href="mailto:${data.email}" class="hover:text-primary transition-colors">${data.email || 'N/A'}</a></div>
                            <div class="flex items-center gap-2"><span class="material-symbols-outlined text-[14px]">call</span> ${data.phone || 'N/A'}</div>
                        </div>
                        <div class="flex items-center justify-between mt-auto pt-4 border-t border-gray-800">
                            ${data.status === 'unread' ? 
                                `<button onclick="markRead('${docSnap.id}')" class="text-xs font-medium text-primary hover:text-blue-400 flex items-center gap-1 transition-colors"><span class="material-symbols-outlined text-[16px]">mark_email_read</span> Mark as Read</button>` : 
                                `<span class="text-xs text-secondary flex items-center gap-1"><span class="material-symbols-outlined text-[16px]">done_all</span> Read</span>`
                            }
                            <button onclick="deleteFeedback('${docSnap.id}')" class="text-xs text-red-400 hover:text-red-300 flex items-center gap-1 transition-colors">
                                <span class="material-symbols-outlined text-[16px]">delete</span> Delete
                            </button>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            });
        });

        window.markRead = async (id) => {
            try {
                await updateDoc(doc(db, "feedback", id), { status: 'read' });
            } catch(e) {
                console.error(e);
            }
        };

        window.deleteFeedback = async (id) => {
            if(confirm("Are you sure you want to delete this message?")) {
                try {
                    await deleteDoc(doc(db, "feedback", id));
                } catch(e) {
                    console.error(e);
                }
            }
        };
    </script>
</body>
</html>
