<body class="text-on-surface antialiased flex h-screen overflow-hidden bg-pattern-light">
    <!-- Sidebar -->
    <aside class="w-64 bg-surface/90 backdrop-blur-md border-r border-outline-variant/30 flex flex-col">
        <div class="h-20 flex items-center justify-center border-b border-outline-variant/30">
            <h1 class="text-xl font-bold text-primary tracking-wider">PHO ADMIN</h1>
        </div>
        <nav class="flex-1 p-4 space-y-2">
            <a href="index.html" class="flex items-center space-x-3 p-3 rounded-lg hover:bg-surface-container-high transition-colors text-secondary">
                <span class="material-symbols-outlined">dashboard</span>
                <span>Dashboard</span>
            </a>
            <a href="user-manager.html" class="flex items-center space-x-3 p-3 rounded-lg hover:bg-surface-container-high transition-colors bg-primary-container text-on-primary-container font-semibold">
                <span class="material-symbols-outlined">group</span>
                <span>Users</span>
            </a>
            <a href="food-list.html" class="flex items-center space-x-3 p-3 rounded-lg hover:bg-surface-container-high transition-colors text-secondary">
                <span class="material-symbols-outlined">restaurant_menu</span>
                <span>Food Menu</span>
            </a>
            <a href="food-add.html" class="flex items-center space-x-3 p-3 rounded-lg hover:bg-surface-container-high transition-colors text-secondary">

            </a>
            <a href="order-manager.html" class="flex items-center space-x-3 p-3 rounded-lg hover:bg-surface-container-high transition-colors text-secondary">

                <span>Orders</span>
            </a>
            <a href="reservations.html" class="flex items-center space-x-3 p-3 rounded-lg hover:bg-surface-container-high transition-colors text-secondary">
                <span class="material-symbols-outlined">table_restaurant</span>
                <span>Reservations</span>
            </a>
            <a href="feedback.html" class="flex items-center space-x-3 p-3 rounded-lg hover:bg-surface-container-high transition-colors text-secondary">

            </a>
            <a href="messages.html" class="flex items-center space-x-3 p-3 rounded-lg hover:bg-surface-container-high transition-colors text-secondary">

                <span>Kitchen KDS</span>
            </a>
        </nav>
        <div class="p-4 border-t border-outline-variant/30">
            <button onclick="window.logoutUser()" class="flex w-full items-center space-x-3 p-3 rounded-lg hover:bg-red-900/50 text-red-400 transition-colors">

            <h2 class="text-2xl font-semibold text-on-surface">User Management</h2>
            <div class="flex items-center space-x-4">
                <button onclick="window.exportTableToExcel('user-table', 'users.xlsx')" class="bg-green-600 hover:bg-green-700 text-on-surface py-2 px-4 rounded-lg flex items-center gap-2 transition-colors shadow">

                    <span>Xuất Excel</span>
                </button>
                <span class="material-symbols-outlined text-secondary cursor-pointer hover:text-on-surface">notifications</span>
                <div class="w-10 h-10 rounded-full bg-primary flex items-center justify-center text-on-surface font-bold">A</div>
            </div>
        </header>
        <div class="p-8 flex-1">
            <div class="bg-surface/90 backdrop-blur-md rounded-xl border border-outline-variant/30 p-6 shadow-lg">
                <table id="user-table" class="w-full text-left">
                    <thead>
                        <tr class="border-b border-outline-variant/30 text-secondary">
                            <th class="py-3 px-4 font-medium">Name</th>
                            <th class="py-3 px-4 font-medium">Email</th>
                            <th class="py-3 px-4 font-medium">Role</th>
                            <th class="py-3 px-4 font-medium">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="user-table-body">
                        <!-- Users will be loaded here -->
                        <tr><td colspan="4" class="p-4 text-center text-secondary">Loading users...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
